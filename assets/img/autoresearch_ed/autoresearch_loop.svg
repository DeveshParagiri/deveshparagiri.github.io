<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .box-active { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .label { font-size: 13px; fill: #374151; font-weight: 500; text-anchor: middle; }
      .sublabel { font-size: 10.5px; fill: #6b7280; text-anchor: middle; }
      .arrow { stroke: #374151; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .title { font-size: 18px; fill: #111827; font-weight: 600; text-anchor: middle; }
      .note { font-size: 10px; fill: #9ca3af; text-anchor: middle; font-style: italic; }
    </style>
  </defs>
  
  <!-- Steps arranged in a cycle -->
  <!-- 1. Extract Formula -->
  <rect x="50" y="60" width="160" height="56" class="box"/>
  <text x="130" y="84" class="label">Extract Formula</text>
  <text x="130" y="100" class="sublabel">from C++ source</text>
  
  <!-- 2. Replicate in Python -->
  <rect x="310" y="60" width="160" height="56" class="box"/>
  <text x="390" y="84" class="label">Replicate in Python</text>
  <text x="390" y="100" class="sublabel">fast evaluation (~1s/grid)</text>
  
  <!-- 3. Evaluate -->
  <rect x="570" y="60" width="180" height="56" class="box"/>
  <text x="660" y="84" class="label">Evaluate vs Observations</text>
  <text x="660" y="100" class="sublabel">iLAMB benchmarks</text>
  
  <!-- 4. LLM Diagnosis (highlighted) -->
  <rect x="570" y="210" width="180" height="70" class="box-active"/>
  <text x="660" y="237" class="label" fill="#1d4ed8">LLM Diagnosis</text>
  <text x="660" y="255" class="sublabel">why does the formula</text>
  <text x="660" y="268" class="sublabel">disagree with observations?</text>
  
  <!-- 5. Propose Alternatives -->
  <rect x="310" y="215" width="160" height="60" class="box-active"/>
  <text x="390" y="239" class="label" fill="#1d4ed8">Propose Alternatives</text>
  <text x="390" y="255" class="sublabel">along physical axes</text>
  
  <!-- 6. Bayesian Optimization -->
  <rect x="50" y="215" width="160" height="60" class="box"/>
  <text x="130" y="239" class="label">Bayesian Search</text>
  <text x="130" y="255" class="sublabel">structure × parameters</text>
  
  <!-- 7. Validate -->
  <rect x="50" y="370" width="160" height="56" class="box"/>
  <text x="130" y="394" class="label">Validate</text>
  <text x="130" y="410" class="sublabel">cross-validation, diagnostics</text>
  
  <!-- 8. C++ Replacement -->
  <rect x="310" y="370" width="160" height="56" class="box"/>
  <text x="390" y="394" class="label">C++ Replacement</text>
  <text x="390" y="410" class="sublabel">portable formula</text>

  <!-- Arrows -->
  <line x1="210" y1="88" x2="308" y2="88" class="arrow"/>
  <line x1="470" y1="88" x2="568" y2="88" class="arrow"/>
  <line x1="660" y1="116" x2="660" y2="208" class="arrow"/>
  <line x1="568" y1="245" x2="472" y2="245" class="arrow"/>
  <line x1="308" y1="245" x2="212" y2="245" class="arrow"/>
  <line x1="130" y1="275" x2="130" y2="368" class="arrow"/>
  <line x1="212" y1="398" x2="308" y2="398" class="arrow"/>
  
  <!-- Feedback arrow from C++ back to Evaluate -->
  <path d="M 470 398 Q 540 398 540 340 Q 540 170 660 170 L 660 118" class="arrow" stroke-dasharray="5,4" stroke="#9ca3af"/>
  <text x="555" y="340" class="note">iterate</text>
  
  <!-- Key insight annotation -->
  <rect x="560" y="380" width="200" height="48" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="400" class="sublabel" fill="#92400e" font-weight="600">Key insight: structural diagnosis</text>
  <text x="660" y="414" class="sublabel" fill="#92400e">(steps 4-5) drives the largest gains</text>
</svg>