<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <style>
      .mod { rx: 10; stroke-width: 1.5; }
      .mod-done { fill: #dcfce7; stroke: #16a34a; }
      .mod-improved { fill: #dbeafe; stroke: #2563eb; }
      .mod-partial { fill: #fef9c3; stroke: #ca8a04; }
      .mod-input { fill: #f3f4f6; stroke: #9ca3af; }
      .mtext { font-size: 13px; font-weight: 600; text-anchor: middle; }
      .msub { font-size: 10px; fill: #6b7280; text-anchor: middle; }
      .dep { stroke: #9ca3af; stroke-width: 1.2; fill: none; marker-end: url(#arr2); }
      .legend-text { font-size: 10.5px; fill: #374151; }
    </style>
  </defs>

  <!-- Climate Forcing (input) -->
  <rect x="220" y="20" width="260" height="44" class="mod mod-input"/>
  <text x="350" y="40" class="mtext" fill="#6b7280">Climate Forcing</text>
  <text x="350" y="54" class="msub">T, P, radiation, humidity, CO₂</text>
  
  <!-- Photosynthesis -->
  <rect x="120" y="110" width="180" height="50" class="mod mod-improved"/>
  <text x="210" y="132" class="mtext" fill="#1e40af">Photosynthesis</text>
  <text x="210" y="148" class="msub">GPP r: 0.56 → 0.73</text>
  
  <!-- Hydrology -->
  <rect x="400" y="110" width="180" height="50" class="mod mod-improved"/>
  <text x="490" y="132" class="mtext" fill="#1e40af">Hydrology</text>
  <text x="490" y="148" class="msub">ET r: 0.88 → 0.93</text>
  
  <!-- Growth -->
  <rect x="40" y="210" width="140" height="44" class="mod mod-partial"/>
  <text x="110" y="230" class="mtext" fill="#854d0e">Growth</text>
  <text x="110" y="248" class="msub">allocation, NPP</text>
  
  <!-- Phenology -->
  <rect x="280" y="210" width="140" height="44" class="mod mod-improved"/>
  <text x="350" y="230" class="mtext" fill="#1e40af">Phenology</text>
  <text x="350" y="248" class="msub">LAI r: 0.76 → 0.80</text>
  
  <!-- Mortality -->
  <rect x="520" y="210" width="140" height="44" class="mod mod-partial"/>
  <text x="590" y="230" class="mtext" fill="#854d0e">Mortality</text>
  <text x="590" y="248" class="msub">no obs target</text>

  <!-- Soil Carbon -->
  <rect x="180" y="320" width="200" height="50" class="mod mod-improved"/>
  <text x="280" y="342" class="mtext" fill="#1e40af">Soil Carbon</text>
  <text x="280" y="358" class="msub">soil_r: 0.43 → 0.48, bias: −50% → 0%</text>
  
  <!-- Runoff -->
  <rect x="440" y="320" width="180" height="50" class="mod mod-improved"/>
  <text x="530" y="342" class="mtext" fill="#1e40af">Runoff</text>
  <text x="530" y="358" class="msub">r: 0.76 → 0.85</text>
  
  <!-- Fire -->
  <rect x="220" y="420" width="180" height="50" class="mod mod-done"/>
  <text x="310" y="442" class="mtext" fill="#166534">Fire</text>
  <text x="310" y="458" class="msub">r: 0.09 → 0.65</text>

  <!-- Arrows: Climate → modules -->
  <line x1="280" y1="64" x2="210" y2="108" class="dep"/>
  <line x1="420" y1="64" x2="490" y2="108" class="dep"/>
  
  <!-- Photosynthesis → Growth, Phenology -->
  <line x1="170" y1="160" x2="120" y2="208" class="dep"/>
  <line x1="260" y1="160" x2="330" y2="208" class="dep"/>
  
  <!-- Hydrology → Phenology, Runoff -->
  <line x1="450" y1="160" x2="380" y2="208" class="dep"/>
  <line x1="530" y1="160" x2="540" y2="318" class="dep"/>
  
  <!-- Growth → Soil Carbon -->
  <line x1="130" y1="254" x2="230" y2="318" class="dep"/>
  
  <!-- Phenology → Soil Carbon -->
  <line x1="340" y1="254" x2="300" y2="318" class="dep"/>
  
  <!-- Hydrology → Soil Carbon (moisture) -->
  <path d="M 470 160 Q 430 240 340 318" class="dep"/>
  
  <!-- Mortality → Growth feedback -->
  <line x1="540" y1="254" x2="540" y2="208" class="dep" stroke-dasharray="4,3"/>
  
  <!-- Soil Carbon → Fire -->
  <line x1="280" y1="370" x2="300" y2="418" class="dep"/>
  
  <!-- Legend -->
  <rect x="20" y="470" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="40" y="482" class="legend-text">Completed (fire)</text>
  <rect x="160" y="470" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="180" y="482" class="legend-text">Improved (this work)</text>
  <rect x="330" y="470" width="14" height="14" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="350" y="482" class="legend-text">No observation target</text>
  <rect x="500" y="470" width="14" height="14" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="520" y="482" class="legend-text">External input</text>
</svg>